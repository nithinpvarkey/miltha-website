<svg xmlns="http://www.w3.org/2000/svg" viewBox="44 44 302 302" width="180" height="180">
  <defs>
    <linearGradient id="purp-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A758D6"/>
      <stop offset="100%" stop-color="#5A68E8"/>
    </linearGradient>
    <linearGradient id="cyan-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#32C6D1"/>
      <stop offset="100%" stop-color="#24CAA0"/>
    </linearGradient>
    <linearGradient id="yell-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFCC33"/>
      <stop offset="100%" stop-color="#FF9030"/>
    </linearGradient>
  </defs>

  <!-- Dark navy background with rounded corners -->
  <rect x="44" y="44" width="302" height="302" rx="57" fill="#0a0f1e"/>

  <!-- Purple chevron arm (top-left) -->
  <path d="M 197.65 138.82 L 120 100 L 120 175" fill="none" stroke="url(#purp-grad)" stroke-width="36" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Cyan chevron arm (bottom-left) -->
  <path d="M 120 225 L 120 300 L 197.65 261.18" fill="none" stroke="url(#cyan-grad)" stroke-width="36" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Yellow chevron (right arrow) -->
  <path d="M 242.35 238.82 L 320 200 L 242.35 161.18" fill="none" stroke="url(#yell-grad)" stroke-width="36" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Purple accent dots -->
  <circle cx="130" cy="50" r="4.5" fill="#A758D6"/>
  <circle cx="60" cy="90" r="6" fill="#8860DF"/>
  <circle cx="80" cy="140" r="4" fill="#6965E5"/>

  <!-- Cyan accent dots -->
  <circle cx="100" cy="330" r="5.5" fill="#24CAA0"/>
  <circle cx="60" cy="280" r="4.5" fill="#2BC8B8"/>
  <circle cx="160" cy="310" r="4" fill="#30C7CA"/>

  <!-- Yellow accent dots -->
  <circle cx="340" cy="170" r="5" fill="#FFCC33"/>
  <circle cx="320" cy="235" r="4" fill="#FF9030"/>
</svg>
